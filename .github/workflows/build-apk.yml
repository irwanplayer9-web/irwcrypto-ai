name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  NODE_OPTIONS: --max-old-space-size=4096
  EXPO_PUBLIC_DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY || 'sk-ws-H.ILXEDR.eDbZ.MEYCIQCOa-6ST7faHeGZddFrDfCkBoN_mi7HPrmpI60qqjuJKQIhAN-odwbsxdOocFazq3FXbfyx2QoM8BkM6rpH0zZVwGdA' }}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fix gradlew line endings & permissions
        run: |
          if [ -f android/gradlew ]; then
            # remove CR (Windows) characters that break the shebang and ensure executable
            sed -i 's/\r$//' android/gradlew || true
            chmod +x android/gradlew || true
          fi

      - name: Diagnose gradlew (prints info to log)
        if: always()
        run: |
          echo "=== LIST android/ ==="
          ls -la android || true
          echo "=== gradlew details ==="
          if [ -f android/gradlew ]; then
            file android/gradlew || true
            echo "--- shebang (visible) ---"
            head -n1 android/gradlew | sed -n l || true
            echo "--- hexdump first 64 bytes ---"
            command -v xxd >/dev/null && xxd -g 1 -l 64 android/gradlew || true
            stat -c '%A %a %n' android/gradlew || true
          else
            echo "android/gradlew NOT FOUND"
          fi
          echo "=== gradle wrapper jar ==="
          ls -la android/gradle/wrapper || true
          test -f android/gradle/wrapper/gradle-wrapper.jar && echo "wrapper.jar OK" || echo "wrapper.jar MISSING"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Clean Gradle
        run: |
          cd android
          ./gradlew clean --no-daemon

      - name: Build APK with Gradle
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: irwcrypto-ai-apk
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 30
